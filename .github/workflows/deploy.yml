name: Deploy Firebase Hosting (Isolated)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Passo 1 - Baixar código do repositório
      uses: actions/checkout@v4

    - name: Passo 2 - Instalar Firebase CLI
      run: npm install -g firebase-tools

    - name: Passo 3 - Publicar no Firebase Hosting
      env:
        FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
      run: |
        if [ -z "$FIREBASE_TOKEN" ]; then
          echo "Erro: A Secret FIREBASE_TOKEN não foi configurada ou está vazia no GitHub!"
          exit 1
        fi
        
        # Mostra a versão instalada no log para conferência
        firebase --version
        
        # COMANDO DIRETO: Usa o token direto no deploy, eliminando o erro de login:ci
        firebase deploy --only hosting --token "$FIREBASE_TOKEN"